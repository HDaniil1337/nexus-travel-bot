import { useState, useEffect } from "react";

const TOPICS = [
  { id: "hidden", label: "Скрытые места", emoji: "🗺️" },
  { id: "budget", label: "Бюджетные маршруты", emoji: "💶" },
  { id: "food", label: "Еда и рестораны", emoji: "🍜" },
  { id: "tips", label: "Лайфхаки путешественника", emoji: "💡" },
  { id: "weekend", label: "Уикенд поездки", emoji: "✈️" },
  { id: "culture", label: "Культура и история", emoji: "🏛️" },
];

const CITIES = [
  "Лиссабон", "Барселона", "Прага", "Будапешт", "Краков",
  "Амстердам", "Вена", "Рим", "Афины", "Дубровник",
  "Таллин", "Рига", "Варшава", "Загреб", "Любляна"
];

const SCHEDULE = [
  { time: "08:00", label: "Утренний пост" },
  { time: "12:00", label: "Дневной пост" },
  { time: "17:00", label: "Вечерний пост" },
  { time: "21:00", label: "Ночной пост" },
];

function PostCard({ post, onCopy }) {
  return (
    <div style={{
      background: "linear-gradient(135deg, #0d1b2e 0%, #112240 100%)",
      border: "1px solid #1e3a5f",
      borderRadius: "16px",
      padding: "20px",
      marginBottom: "16px",
      position: "relative",
      overflow: "hidden",
    }}>
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, height: "2px",
        background: "linear-gradient(90deg, #00b4d8, #0077b6, #48cae4)",
      }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "12px" }}>
        <span style={{
          background: "#0077b6",
          color: "#caf0f8",
          padding: "4px 10px",
          borderRadius: "20px",
          fontSize: "11px",
          fontWeight: "600",
          letterSpacing: "0.5px",
        }}>{post.topic}</span>
        <span style={{ color: "#4a8fa8", fontSize: "12px" }}>{post.city}</span>
      </div>
      <p style={{
        color: "#cad3c8",
        fontSize: "14px",
        lineHeight: "1.7",
        margin: "0 0 16px",
        whiteSpace: "pre-wrap",
      }}>{post.content}</p>
      <div style={{ display: "flex", gap: "8px" }}>
        <button onClick={() => onCopy(post.content)} style={{
          background: "transparent",
          border: "1px solid #1e3a5f",
          color: "#4a8fa8",
          padding: "6px 14px",
          borderRadius: "8px",
          cursor: "pointer",
          fontSize: "12px",
          transition: "all 0.2s",
        }}
          onMouseOver={e => { e.target.style.borderColor = "#00b4d8"; e.target.style.color = "#00b4d8"; }}
          onMouseOut={e => { e.target.style.borderColor = "#1e3a5f"; e.target.style.color = "#4a8fa8"; }}
        >
          📋 Копировать
        </button>
        <span style={{ color: "#2d5a7a", fontSize: "12px", display: "flex", alignItems: "center" }}>
          {post.time}
        </span>
      </div>
    </div>
  );
}

function Stat({ label, value, color }) {
  return (
    <div style={{
      background: "#0a1628",
      border: "1px solid #1e3a5f",
      borderRadius: "12px",
      padding: "16px",
      textAlign: "center",
      flex: 1,
    }}>
      <div style={{ fontSize: "24px", fontWeight: "700", color: color || "#00b4d8", marginBottom: "4px" }}>{value}</div>
      <div style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "0.5px" }}>{label}</div>
    </div>
  );
}

export default function TravelBotDashboard() {
  const [activeTab, setActiveTab] = useState("generate");
  const [selectedTopics, setSelectedTopics] = useState(["hidden", "budget"]);
  const [selectedCity, setSelectedCity] = useState("Лиссабон");
  const [customCity, setCustomCity] = useState("");
  const [postsPerDay, setPostsPerDay] = useState(4);
  const [generatedPosts, setGeneratedPosts] = useState([]);
  const [isLoading, setIsLoading] = useState(false);
  const [copied, setCopied] = useState(false);
  const [error, setError] = useState(null);
  const [stats] = useState({ total: 47, week: 28, cities: 12 });
  const [channelName, setChannelName] = useState("ATLAS Travel");

  const toggleTopic = (id) => {
    setSelectedTopics(prev =>
      prev.includes(id) ? prev.filter(t => t !== id) : [...prev, id]
    );
  };

  const generatePosts = async () => {
    if (selectedTopics.length === 0) {
      setError("Выбери хотя бы одну тему");
      return;
    }
    setIsLoading(true);
    setError(null);
    setGeneratedPosts([]);

    const city = customCity.trim() || selectedCity;
    const topicLabels = selectedTopics.map(id => TOPICS.find(t => t.id === id)?.label).join(", ");

    const prompt = `Ты — редактор Telegram-канала о путешествиях "${channelName}". 
Стиль: дружелюбный, живой, тёмная эстетика, короткие абзацы, эмодзи уместно.
Язык: русский + иногда английские слова органично.

Создай ${postsPerDay} поста для Telegram-канала о путешествиях по теме: ${topicLabels}.
Город/регион: ${city}.

Каждый пост должен быть:
- 150-250 слов
- С заголовком и эмодзи
- С конкретными советами или фактами
- Заканчиваться вовлекающим вопросом или призывом
- Разделены строкой "---POST---"

Только посты, без пояснений.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content?.map(i => i.text || "").join("\n") || "";
      const parts = text.split("---POST---").map(p => p.trim()).filter(Boolean);

      const scheduleSlice = SCHEDULE.slice(0, postsPerDay);
      const topicNames = selectedTopics.map(id => TOPICS.find(t => t.id === id)?.label || id);

      const posts = parts.map((content, i) => ({
        id: i,
        content,
        city,
        topic: topicNames[i % topicNames.length],
        time: scheduleSlice[i]?.label || `Пост ${i + 1}`,
      }));

      setGeneratedPosts(posts);
    } catch (e) {
      setError("Ошибка генерации. Попробуй снова.");
    } finally {
      setIsLoading(false);
    }
  };

  const copyPost = (text) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const copyAll = () => {
    const all = generatedPosts.map(p => p.content).join("\n\n---\n\n");
    navigator.clipboard.writeText(all).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const tabs = [
    { id: "generate", label: "✈️ Генератор" },
    { id: "schedule", label: "🕐 Расписание" },
    { id: "setup", label: "⚙️ Настройки" },
  ];

  return (
    <div style={{
      background: "#060e1a",
      minHeight: "100vh",
      fontFamily: "'Inter', -apple-system, sans-serif",
      color: "#e0e8f0",
      padding: "0",
    }}>
      {/* Header */}
      <div style={{
        background: "linear-gradient(180deg, #0a1628 0%, #060e1a 100%)",
        borderBottom: "1px solid #1e3a5f",
        padding: "20px 24px 0",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "20px" }}>
          <div style={{
            width: "40px", height: "40px",
            background: "linear-gradient(135deg, #0077b6, #00b4d8)",
            borderRadius: "12px",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: "20px",
          }}>✈️</div>
          <div>
            <div style={{ fontSize: "18px", fontWeight: "700", letterSpacing: "-0.3px" }}>{channelName}</div>
            <div style={{ fontSize: "11px", color: "#4a8fa8" }}>AI • Telegram Bot Dashboard</div>
          </div>
          <div style={{
            marginLeft: "auto",
            width: "8px", height: "8px",
            background: "#00b4d8",
            borderRadius: "50%",
            boxShadow: "0 0 8px #00b4d8",
          }} />
        </div>

        {/* Stats */}
        <div style={{ display: "flex", gap: "10px", marginBottom: "20px" }}>
          <Stat label="ПОСТОВ ВСЕГО" value={stats.total} color="#00b4d8" />
          <Stat label="ЗА НЕДЕЛЮ" value={stats.week} color="#48cae4" />
          <Stat label="ГОРОДОВ" value={stats.cities} color="#0096c7" />
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: "4px" }}>
          {tabs.map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
              background: activeTab === tab.id ? "#0077b6" : "transparent",
              border: "none",
              color: activeTab === tab.id ? "#fff" : "#4a8fa8",
              padding: "10px 16px",
              borderRadius: "10px 10px 0 0",
              cursor: "pointer",
              fontSize: "13px",
              fontWeight: activeTab === tab.id ? "600" : "400",
              transition: "all 0.2s",
            }}>{tab.label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{ padding: "20px 24px" }}>

        {/* GENERATE TAB */}
        {activeTab === "generate" && (
          <div>
            {/* City selector */}
            <div style={{ marginBottom: "20px" }}>
              <label style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px", display: "block", marginBottom: "10px" }}>
                ГОРОД / РЕГИОН
              </label>
              <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "10px" }}>
                {CITIES.slice(0, 8).map(city => (
                  <button key={city} onClick={() => { setSelectedCity(city); setCustomCity(""); }} style={{
                    background: selectedCity === city && !customCity ? "#0077b6" : "#0a1628",
                    border: `1px solid ${selectedCity === city && !customCity ? "#00b4d8" : "#1e3a5f"}`,
                    color: selectedCity === city && !customCity ? "#fff" : "#4a8fa8",
                    padding: "6px 12px",
                    borderRadius: "8px",
                    cursor: "pointer",
                    fontSize: "12px",
                    transition: "all 0.15s",
                  }}>{city}</button>
                ))}
              </div>
              <input
                value={customCity}
                onChange={e => setCustomCity(e.target.value)}
                placeholder="Или введи любой город..."
                style={{
                  width: "100%",
                  background: "#0a1628",
                  border: "1px solid #1e3a5f",
                  borderRadius: "10px",
                  padding: "10px 14px",
                  color: "#e0e8f0",
                  fontSize: "13px",
                  outline: "none",
                  boxSizing: "border-box",
                }}
              />
            </div>

            {/* Topic selector */}
            <div style={{ marginBottom: "20px" }}>
              <label style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px", display: "block", marginBottom: "10px" }}>
                ТЕМЫ ПОСТОВ
              </label>
              <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                {TOPICS.map(t => (
                  <button key={t.id} onClick={() => toggleTopic(t.id)} style={{
                    background: selectedTopics.includes(t.id) ? "#0d2d4a" : "#0a1628",
                    border: `1px solid ${selectedTopics.includes(t.id) ? "#00b4d8" : "#1e3a5f"}`,
                    color: selectedTopics.includes(t.id) ? "#48cae4" : "#4a8fa8",
                    padding: "8px 12px",
                    borderRadius: "10px",
                    cursor: "pointer",
                    fontSize: "12px",
                    transition: "all 0.15s",
                  }}>{t.emoji} {t.label}</button>
                ))}
              </div>
            </div>

            {/* Posts per day */}
            <div style={{ marginBottom: "24px" }}>
              <label style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px", display: "block", marginBottom: "10px" }}>
                ПОСТОВ В ДЕНЬ: <span style={{ color: "#00b4d8" }}>{postsPerDay}</span>
              </label>
              <div style={{ display: "flex", gap: "8px" }}>
                {[2, 3, 4].map(n => (
                  <button key={n} onClick={() => setPostsPerDay(n)} style={{
                    background: postsPerDay === n ? "#0077b6" : "#0a1628",
                    border: `1px solid ${postsPerDay === n ? "#00b4d8" : "#1e3a5f"}`,
                    color: postsPerDay === n ? "#fff" : "#4a8fa8",
                    padding: "8px 20px",
                    borderRadius: "8px",
                    cursor: "pointer",
                    fontSize: "13px",
                    fontWeight: postsPerDay === n ? "600" : "400",
                  }}>{n}</button>
                ))}
              </div>
            </div>

            {error && (
              <div style={{
                background: "#1a0a0a", border: "1px solid #5a1a1a",
                borderRadius: "10px", padding: "12px 16px",
                color: "#f87171", fontSize: "13px", marginBottom: "16px",
              }}>{error}</div>
            )}

            <button onClick={generatePosts} disabled={isLoading} style={{
              width: "100%",
              background: isLoading ? "#0a1628" : "linear-gradient(135deg, #0077b6, #00b4d8)",
              border: "none",
              color: isLoading ? "#4a8fa8" : "#fff",
              padding: "14px",
              borderRadius: "12px",
              cursor: isLoading ? "not-allowed" : "pointer",
              fontSize: "15px",
              fontWeight: "600",
              letterSpacing: "0.3px",
              transition: "all 0.2s",
              marginBottom: "24px",
            }}>
              {isLoading ? "⏳ Генерирую посты..." : "🚀 Сгенерировать посты"}
            </button>

            {generatedPosts.length > 0 && (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                  <span style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px" }}>
                    ГОТОВЫЕ ПОСТЫ ({generatedPosts.length})
                  </span>
                  <button onClick={copyAll} style={{
                    background: "transparent",
                    border: "1px solid #1e3a5f",
                    color: copied ? "#00b4d8" : "#4a8fa8",
                    padding: "6px 12px",
                    borderRadius: "8px",
                    cursor: "pointer",
                    fontSize: "12px",
                  }}>
                    {copied ? "✅ Скопировано!" : "📋 Копировать всё"}
                  </button>
                </div>
                {generatedPosts.map(post => (
                  <PostCard key={post.id} post={post} onCopy={copyPost} />
                ))}
              </>
            )}
          </div>
        )}

        {/* SCHEDULE TAB */}
        {activeTab === "schedule" && (
          <div>
            <div style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px", marginBottom: "16px" }}>
              РАСПИСАНИЕ ПУБЛИКАЦИЙ
            </div>
            {SCHEDULE.map((s, i) => (
              <div key={i} style={{
                background: "#0a1628",
                border: "1px solid #1e3a5f",
                borderRadius: "12px",
                padding: "16px",
                marginBottom: "10px",
                display: "flex",
                alignItems: "center",
                gap: "16px",
              }}>
                <div style={{
                  background: "linear-gradient(135deg, #0077b6, #00b4d8)",
                  borderRadius: "10px",
                  padding: "8px 12px",
                  fontSize: "16px",
                  fontWeight: "700",
                  color: "#fff",
                  minWidth: "60px",
                  textAlign: "center",
                }}>{s.time}</div>
                <div>
                  <div style={{ fontSize: "14px", color: "#e0e8f0", fontWeight: "500" }}>{s.label}</div>
                  <div style={{ fontSize: "12px", color: "#4a8fa8", marginTop: "2px" }}>
                    {TOPICS[i % TOPICS.length]?.emoji} {TOPICS[i % TOPICS.length]?.label}
                  </div>
                </div>
                <div style={{
                  marginLeft: "auto",
                  width: "8px", height: "8px",
                  background: "#00b4d8",
                  borderRadius: "50%",
                  boxShadow: "0 0 6px #00b4d8",
                }} />
              </div>
            ))}
            <div style={{
              background: "#0a1628",
              border: "1px dashed #1e3a5f",
              borderRadius: "12px",
              padding: "20px",
              textAlign: "center",
              color: "#4a8fa8",
              fontSize: "13px",
              marginTop: "16px",
            }}>
              💡 Автоматическая публикация через Python + GitHub Actions
            </div>
          </div>
        )}

        {/* SETUP TAB */}
        {activeTab === "setup" && (
          <div>
            <div style={{ fontSize: "11px", color: "#4a8fa8", letterSpacing: "1px", marginBottom: "16px" }}>
              НАСТРОЙКИ КАНАЛА
            </div>

            {[
              { label: "Название канала", value: channelName, setter: setChannelName, placeholder: "ATLAS Travel" },
            ].map((field, i) => (
              <div key={i} style={{ marginBottom: "16px" }}>
                <label style={{ fontSize: "12px", color: "#4a8fa8", display: "block", marginBottom: "8px" }}>
                  {field.label}
                </label>
                <input
                  value={field.value}
                  onChange={e => field.setter(e.target.value)}
                  placeholder={field.placeholder}
                  style={{
                    width: "100%",
                    background: "#0a1628",
                    border: "1px solid #1e3a5f",
                    borderRadius: "10px",
                    padding: "10px 14px",
                    color: "#e0e8f0",
                    fontSize: "13px",
                    outline: "none",
                    boxSizing: "border-box",
                  }}
                />
              </div>
            ))}

            <div style={{
              background: "#0a1628",
              border: "1px solid #1e3a5f",
              borderRadius: "12px",
              padding: "16px",
              marginTop: "8px",
            }}>
              <div style={{ fontSize: "12px", color: "#4a8fa8", marginBottom: "12px", letterSpacing: "1px" }}>
                СЛЕДУЮЩИЙ ШАГ — PYTHON БОТ
              </div>
              {[
                "1. Создай Telegram бота через @BotFather",
                "2. Получи BOT_TOKEN и CHANNEL_ID",
                "3. Добавь Claude API Key",
                "4. Задеплой на GitHub Actions (бесплатно)",
                "5. Бот публикует автоматически по расписанию",
              ].map((step, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: "10px",
                  padding: "8px 0",
                  borderBottom: i < 4 ? "1px solid #0d1b2e" : "none",
                }}>
                  <div style={{
                    width: "20px", height: "20px",
                    background: "#0077b6",
                    borderRadius: "50%",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: "10px", color: "#fff", fontWeight: "700",
                    flexShrink: 0,
                  }}>{i + 1}</div>
                  <span style={{ fontSize: "13px", color: "#cad3c8" }}>{step.slice(3)}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
